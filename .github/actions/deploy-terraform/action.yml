name: 'Deploy Terraform Module'
description: 'Composite action for consistent Terraform init/validate/plan/apply across all modules'

inputs:
  working-directory:
    description: 'Terraform module directory relative to repo root'
    required: true
  terraform-plan-args:
    description: 'Additional arguments for terraform plan and apply'
    required: false
    default: ''
  aws-access-key-id:
    description: 'AWS Access Key ID'
    required: true
  aws-secret-access-key:
    description: 'AWS Secret Access Key'
    required: true
  aws-region:
    description: 'AWS Region'
    required: false
    default: 'ap-south-1'

runs:
  using: composite

  steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Cache Terraform Plugins
      uses: actions/cache@v4
      with:
        path: ~/.terraform.d/plugin-cache
        key: terraform-${{ runner.os }}-${{ hashFiles(format('{0}/**/.terraform.lock.hcl', inputs.working-directory)) }}

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3

    - name: Configure AWS Credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ inputs.aws-access-key-id }}
        aws-secret-access-key: ${{ inputs.aws-secret-access-key }}
        aws-region: ${{ inputs.aws-region }}

    - name: Terraform Format Check
      shell: bash
      run: terraform fmt -check
      working-directory: ${{ inputs.working-directory }}

    - name: Terraform Init
      shell: bash
      run: terraform init
      working-directory: ${{ inputs.working-directory }}

    - name: Terraform Validate
      shell: bash
      run: terraform validate
      working-directory: ${{ inputs.working-directory }}

    - name: Terraform Plan
      id: plan
      shell: bash
      run: terraform plan ${{ inputs.terraform-plan-args }}
      working-directory: ${{ inputs.working-directory }}
      continue-on-error: true

    - name: Terraform Plan Status
      shell: bash
      if: steps.plan.outcome == 'failure'
      run: exit 1

    - name: Terraform Apply
      shell: bash
      run: terraform apply -auto-approve ${{ inputs.terraform-plan-args }}
      working-directory: ${{ inputs.working-directory }}
